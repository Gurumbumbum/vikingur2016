- uses: actions/checkout@v4

- name: Setup Node
  uses: actions/setup-node@v4
  with:
    node-version: 20

- name: Install dependencies (persistent)
  run: npm install

- name: Install missing packages explicitly
  run: npm install playwright google-spreadsheet

- name: Verify install
  run: node -e "console.log(require('google-spreadsheet'))"

- name: Install Playwright browsers
  run: npx playwright install

- name: Run scraper
  run: node scraper.js
  env:
    GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
